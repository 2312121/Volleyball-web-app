{% extends "layout.html" %}
{% block body %}

<div class="player-grid">
    {% for player in results %}
        <a href="/player/{{ player['playerID'] }}" class="player-card">
            <div class="player-info">
                <h3>{{ player[2] }}</h3>
                <p>{{ player[4] }}</p>
                <p>{{ player[3] }}</p>
            </div>
        </a>
    {% endfor %}
</div>

{% endblock %}
